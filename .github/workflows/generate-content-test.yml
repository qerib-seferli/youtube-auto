name: Gemini Content Generation Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-content:
    name: Generate video script and metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}

    steps:
      - name: Repository-ni yüklə
        uses: actions/checkout@v4

      - name: Python-u hazırla
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python paketlərini quraşdır
        run: |
          python -m pip install --upgrade pip
          pip install supabase requests

      - name: Secret-ləri yoxla
        shell: bash
        run: |
          required=(
            SUPABASE_URL
            SUPABASE_SERVICE_ROLE_KEY
            GEMINI_API_KEY
            GEMINI_MODEL
          )

          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::$name secret boşdur"
              exit 1
            fi
          done

          echo "Bütün secret-lər mövcuddur."

      - name: Ssenari və metadata yarat
        run: python worker/generate_content.py
